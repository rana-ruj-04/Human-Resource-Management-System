<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — HRMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#8dd1e9;
  --surface:#f1fcf3;
  --ink:#1C2321;
  --ink-soft:#5B6660;
  --ink-faint:#8A938D;
  --line:#E2E5DE;
  --accent:#3D5A80;
  --accent-ink:#2A4160;
  --accent-soft:#E7EDF3;
  --sage:#4C7A56;
  --sage-soft:#E7EFE6;
  --amber:#B4813A;
  --amber-soft:#FBF1E1;
  --rose:#AF4448;
  --rose-soft:#FBEAEA;
  --mono:'IBM Plex Mono', monospace;
  --display:'Fraunces', serif;
  --body:'Inter', sans-serif;
  --radius:10px;
  --shadow:0 1px 2px rgba(28,35,33,0.06), 0 4px 14px rgba(28,35,33,0.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--body);
  font-size:14.5px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
#app{min-height:100vh;display:flex;flex-direction:column;}
h1,h2,h3,h4{font-family:var(--display);font-weight:600;margin:0 0 4px;color:var(--ink);}
p{margin:0;}
a{color:var(--accent);text-decoration:none;}
button{font-family:var(--body);cursor:pointer;}
input,select,textarea{font-family:var(--body);}
::selection{background:var(--accent-soft);}
@media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }

/* ---------- layout shells ---------- */
.auth-shell{display:flex;min-height:100vh;}
.auth-brand{
  flex:1.1;background:var(--ink);color:#EFEFEA;position:relative;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:48px 52px;overflow:hidden;
}
.auth-brand::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 80% 110%, rgba(61,90,128,0.35), transparent 60%);
  pointer-events:none;
}
.brand-mark{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;opacity:.75;}
.brand-headline{font-family:var(--display);font-size:clamp(30px,4vw,46px);line-height:1.08;max-width:480px;position:relative;z-index:1;}
.brand-sub{color:#C6CBC3;max-width:420px;margin-top:14px;font-size:15px;position:relative;z-index:1;}
.week-row{display:flex;gap:9px;position:relative;z-index:1;margin-top:10px;}
.week-cell{
  width:34px;height:34px;border-radius:7px;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.16);display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;color:#CBD1C6;
  animation:align-in .7s cubic-bezier(.2,.8,.2,1) both;
}
.week-cell.on{background:var(--sage);border-color:var(--sage);color:#fff;}
.week-cell:nth-child(1){animation-delay:.02s}
.week-cell:nth-child(2){animation-delay:.08s}
.week-cell:nth-child(3){animation-delay:.14s}
.week-cell:nth-child(4){animation-delay:.20s}
.week-cell:nth-child(5){animation-delay:.26s}
.week-cell:nth-child(6){animation-delay:.32s}
.week-cell:nth-child(7){animation-delay:.38s}
@keyframes align-in{
  from{opacity:0; transform:translateY(14px) rotate(-6deg);}
  to{opacity:1; transform:translateY(0) rotate(0);}
}
.auth-foot{font-family:var(--mono);font-size:11.5px;color:#9AA29A;position:relative;z-index:1;}
.auth-panel{
  flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;background:var(--bg);
}
.auth-card{width:100%;max-width:400px;}
.auth-card h1{font-size:26px;margin-bottom:6px;}
.auth-tab-copy{color:var(--ink-soft);font-size:13.5px;margin-bottom:26px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.01em;}
.field input, .field select, .field textarea{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
  background:var(--surface);color:var(--ink);font-size:14px;outline:none;
  transition:border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;}
.hint-list{list-style:none;padding:0;margin:8px 0 0;font-size:12px;color:var(--ink-faint);display:flex;flex-direction:column;gap:3px;}
.hint-list li{display:flex;align-items:center;gap:6px;}
.hint-list li.ok{color:var(--sage);}
.hint-dot{width:6px;height:6px;border-radius:50%;background:var(--ink-faint);flex-shrink:0;}
.hint-list li.ok .hint-dot{background:var(--sage);}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 18px;border-radius:8px;border:1px solid transparent;font-weight:600;font-size:13.5px;
  transition:transform .08s, background .15s, border-color .15s; user-select:none;
}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-ink);}
.btn-block{width:100%;}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--line);}
.btn-ghost:hover{border-color:var(--ink-faint);}
.btn-sage{background:var(--sage);color:#fff;}
.btn-rose{background:var(--rose);color:#fff;}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:7px;}
.link-btn{background:none;border:none;color:var(--accent);font-weight:600;font-size:13px;padding:0;}
.error-box{background:var(--rose-soft);color:var(--rose);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px;}
.info-box{background:var(--accent-soft);color:var(--accent-ink);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px;font-family:var(--mono);}
.switcher{margin-top:22px;font-size:13px;color:var(--ink-soft);}

/* ---------- app shell after login ---------- */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 26px;height:60px;position:sticky;top:0;z-index:20;
}
.topbar-left{display:flex;align-items:center;gap:22px;}
.logo{font-family:var(--display);font-weight:700;font-size:18px;display:flex;align-items:center;gap:8px;}
.logo .dot{width:8px;height:8px;background:var(--sage);border-radius:50%;display:inline-block;}
.nav-links{display:flex;gap:4px;}
.nav-link{
  font-size:13px;font-weight:600;color:var(--ink-soft);padding:8px 12px;border-radius:7px;border:none;background:none;
}
.nav-link:hover{color:var(--ink);background:var(--bg);}
.nav-link.active{color:var(--accent-ink);background:var(--accent-soft);}
.topbar-right{display:flex;align-items:center;gap:14px;}
.role-badge{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:5px;background:var(--sage-soft);color:var(--sage);}
.role-badge.admin{background:var(--accent-soft);color:var(--accent-ink);}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12.5px;object-fit:cover;flex-shrink:0;}
.main{flex:1;max-width:1080px;margin:0 auto;width:100%;padding:32px 26px 60px;}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px;}

/* cards / grids */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.grid-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
@media (max-width:900px){.grid-cards{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.grid-cards{grid-template-columns:1fr;}}
.quick-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:border-color .15s, transform .1s;}
.quick-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.quick-card .qc-icon{width:30px;height:30px;border-radius:8px;background:var(--accent-soft);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-size:15px;}
.quick-card h3{font-size:15px;}
.quick-card p{font-size:12px;color:var(--ink-faint);}
.section-title{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin:30px 0 12px;}
.section-title:first-child{margin-top:0;}

.badge{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:5px;}
.badge .dot{width:6px;height:6px;border-radius:50%;}
.badge.present{background:var(--sage-soft);color:var(--sage);}
.badge.present .dot{background:var(--sage);}
.badge.absent{background:var(--rose-soft);color:var(--rose);}
.badge.absent .dot{background:var(--rose);}
.badge.half{background:var(--amber-soft);color:var(--amber);}
.badge.half .dot{background:var(--amber);}
.badge.leave{background:var(--accent-soft);color:var(--accent-ink);}
.badge.leave .dot{background:var(--accent);}
.badge.pending{background:var(--amber-soft);color:var(--amber);}
.badge.pending .dot{background:var(--amber);}
.badge.approved{background:var(--sage-soft);color:var(--sage);}
.badge.approved .dot{background:var(--sage);}
.badge.rejected{background:var(--rose-soft);color:var(--rose);}
.badge.rejected .dot{background:var(--rose);}

table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line);}
td{padding:10px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.table-wrap{overflow-x:auto;}
.muted{color:var(--ink-faint);}
.mono{font-family:var(--mono);font-size:12.5px;}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;}
@media (max-width:820px){.two-col{grid-template-columns:1fr;}}
.stack{display:flex;flex-direction:column;gap:14px;}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:22px;}
.tab-btn{padding:10px 4px;margin-right:20px;font-size:13.5px;font-weight:600;color:var(--ink-faint);background:none;border:none;border-bottom:2px solid transparent;}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--accent);}
.empty-state{padding:34px 20px;text-align:center;color:var(--ink-faint);border:1px dashed var(--line);border-radius:var(--radius);font-size:13.5px;}
hr.hairline{border:none;border-top:1px solid var(--line);margin:18px 0;}
.profile-head{display:flex;gap:18px;align-items:center;margin-bottom:20px;}
.big-avatar{width:64px;height:64px;border-radius:50%;font-size:22px;}
.kv{display:grid;grid-template-columns:130px 1fr;gap:8px 12px;font-size:13.5px;}
.kv dt{color:var(--ink-faint);}
.kv dd{margin:0;}
.doc-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
.doc-row:last-child{border-bottom:none;}
.upload-btn{font-size:12px;color:var(--accent);cursor:pointer;font-weight:600;}
.file-hidden{display:none;}

/* attendance calendar */
.cal-nav{display:flex;align-items:center;gap:10px;}
.cal-nav button{background:var(--bg);border:1px solid var(--line);border-radius:6px;width:28px;height:28px;font-size:13px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px;}
.cal-dow{font-family:var(--mono);font-size:10.5px;text-align:center;color:var(--ink-faint);text-transform:uppercase;}
.cal-day{
  aspect-ratio:1;border-radius:8px;border:1px solid var(--line);background:var(--surface);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:12px;position:relative;
}
.cal-day.blank{border:none;background:transparent;}
.cal-day .num{font-family:var(--mono);color:var(--ink-soft);}
.cal-day .status-dot{width:7px;height:7px;border-radius:50%;}
.cal-day.today{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}
.cal-day.clickable{cursor:pointer;}
.cal-day.clickable:hover{border-color:var(--ink-faint);}
.cal-day.in-range{background:var(--accent-soft);border-color:var(--accent);}
.cal-day.range-end{background:var(--accent);border-color:var(--accent);}
.cal-day.range-end .num{color:#fff;}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--ink-soft);}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.legend .status-dot{width:7px;height:7px;border-radius:50%;}

.status-edit-pop{margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;}

::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}

.toast-wrap{position:fixed;top:18px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:100;}
.toast{background:var(--ink);color:#fff;padding:11px 16px;border-radius:8px;font-size:13px;box-shadow:var(--shadow);animation:toast-in .2s ease-out;max-width:300px;}
.toast.err{background:var(--rose);}
.toast.ok{background:var(--sage);}
@keyframes toast-in{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

.footer-note{text-align:center;color:var(--ink-faint);font-size:11.5px;font-family:var(--mono);padding:20px 0 6px;}
select.plain{padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:var(--surface);font-size:13px;}
.type-chip{display:inline-flex;padding:3px 9px;border-radius:6px;font-size:11.5px;font-weight:600;background:var(--bg);border:1px solid var(--line);}

/* Custom DB & API styles */
.db-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 24px;
}
@media (max-width: 768px) {
  .db-layout { grid-template-columns: 1fr; }
}
.db-sidebar {
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-right: 1px solid var(--line);
  padding-right: 16px;
}
.db-table-btn {
  text-align: left;
  padding: 8px 12px;
  background: none;
  border: 1px solid transparent;
  border-radius: 6px;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink-soft);
  transition: all 0.15s;
}
.db-table-btn:hover {
  background: rgba(0, 0, 0, 0.02);
  color: var(--ink);
}
.db-table-btn.active {
  background: var(--accent-soft);
  color: var(--accent);
  border-color: rgba(99, 102, 241, 0.15);
}
.sql-textarea {
  width: 100%;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.5;
  background: #0f172a;
  color: #f1f5f9;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 14px;
  outline: none;
  resize: vertical;
}
.sql-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
}
.code-box {
  background: #0f172a;
  color: #38bdf8;
  padding: 14px;
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 12.5px;
  overflow-x: auto;
  white-space: pre-wrap;
  border: 1px solid #1e293b;
}
.code-box.error {
  background: #fef2f2;
  color: var(--rose);
  border-color: rgba(239, 68, 68, 0.15);
}
.method-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 5px;
  color: #fff;
  text-transform: uppercase;
  min-width: 60px;
}
.method-badge.get { background: #0ea5e9; }
.method-badge.post { background: #10b981; }
.method-badge.put { background: #f59e0b; }
.method-badge.delete { background: #ef4444; }

.api-endpoint-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px;
  background: var(--surface);
  transition: border-color 0.15s;
  cursor: pointer;
}
.api-endpoint-card:hover {
  border-color: var(--accent);
}
.schema-table {
  width: 100%;
  border-collapse: collapse;
}
.schema-table th {
  background: var(--bg);
}
.schema-table td, .schema-table th {
  padding: 8px 12px;
  border: 1px solid var(--line);
  font-size: 13px;
}
.json-editor {
  width: 100%;
  font-family: var(--mono);
  font-size: 12.5px;
  background: #1e293b;
  color: #f8fafc;
  border: 1px solid #334155;
  border-radius: 6px;
  padding: 8px 12px;
  outline: none;
}
.json-editor:focus {
  border-color: var(--accent);
}
.response-badge {
  font-family: var(--mono);
  font-size: 11.5px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
}
.response-badge.success { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
.response-badge.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
.webhook-log-line {
  padding: 8px 12px;
  border-bottom: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 12px;
}
.webhook-log-line:last-child {
  border-bottom: none;
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
<script>
/* ===================== STATE ===================== */
const LEAVE_TYPES = ['Paid','Sick','Unpaid'];

    { id: 'wh-2', event: 'leave.approved', url: 'https://hooks.payroll-partner.com/leave', desc: 'Sync approved leaves to payroll' }
  ],

  dbQueryResult: null,

  dbTableSearch: '',

// API Endpoints metadata directory for Docs & Testing
const API_DIRECTORY = [
  {
    path: '/api/auth/signin',

  },
  {

    resBody: { status: 'verify', pendingUser: { id: 'EMP-1010', email: 'ananya.roy@ledgerhr.io' }, code: '482931' }
  },
  {

/* ===================== STORAGE HELPERS ===================== */
async function storageGet(key, fallback){
  try{
    const r = await window.storage.get(key, false);
    return r ? JSON.parse(r.value) : fallback;
  }catch(e){ return fallback; }
}
async function storageSet(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), false); }
  catch(e){ console.error('storage set failed', e); }
}

/* ===================== SQLITE DATABASE LAYER =====================
   Real relational storage: three tables (users, attendance, leaves)
   inside an in-browser SQLite database (sql.js / WebAssembly). The
   binary .sqlite file is base64-encoded and kept in window.storage so
   it survives reloads — window.storage is just the disk it sits on,
   the database itself is genuine SQL with a schema, keys and queries. */
let db = null;
const SCHEMA = `
  CREATE TABLE IF NOT EXISTS users (
    id TEXT PRIMARY KEY, name TEXT, email TEXT UNIQUE, password TEXT, role TEXT,
    jobTitle TEXT, department TEXT, joinDate TEXT, phone TEXT, address TEXT,
    status TEXT, avatarColor TEXT, avatarUrl TEXT, documents TEXT,
    basic INTEGER, allowances INTEGER, deductions INTEGER, updatedAt TEXT
  );
  CREATE TABLE IF NOT EXISTS attendance (
    employeeId TEXT, date TEXT, status TEXT, checkIn TEXT, checkOut TEXT,
    PRIMARY KEY (employeeId, date)
  );
  CREATE TABLE IF NOT EXISTS leaves (
    id TEXT PRIMARY KEY, employeeId TEXT, type TEXT, start TEXT, end TEXT,
    remarks TEXT, status TEXT, comment TEXT, createdAt TEXT
  );
`;
function uint8ToBase64(bytes){
  let binary = '';
  const chunk = 0x8000;
  for(let i=0;i<bytes.length;i+=chunk){
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
  }
  return btoa(binary);
}
function base64ToUint8(b64){
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
function dbAll(sql, params){
  const stmt = db.prepare(sql);
  if(params) stmt.bind(params);
  const rows = [];
  while(stmt.step()) rows.push(stmt.getAsObject());
  stmt.free();
  return rows;
}
function dbRun(sql, params){ db.run(sql, params || []); }
async function persistDb(){
  try{
    const bytes = db.export();
    await storageSet('hrms_db_b64', uint8ToBase64(bytes));
  }catch(e){ console.error('db persist failed', e); }
}
function rowToUser(r){
  return {
    id:r.id, name:r.name, email:r.email, password:r.password, role:r.role,
    jobTitle:r.jobTitle, department:r.department, joinDate:r.joinDate,
    phone:r.phone||'', address:r.address||'', status:r.status,
    avatarColor:r.avatarColor, avatarUrl:r.avatarUrl||null,
    documents: (()=>{ try{return JSON.parse(r.documents||'[]');}catch(e){return [];} })(),
    salary:{ basic:r.basic, allowances:r.allowances, deductions:r.deductions },
    updatedAt:r.updatedAt,
  };
}
function dbUpsertUser(u){
  dbRun(`INSERT INTO users (id,name,email,password,role,jobTitle,department,joinDate,phone,address,status,avatarColor,avatarUrl,documents,basic,allowances,deductions,updatedAt)
    VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)
    ON CONFLICT(id) DO UPDATE SET name=excluded.name, email=excluded.email, password=excluded.password,
      role=excluded.role, jobTitle=excluded.jobTitle, department=excluded.department, joinDate=excluded.joinDate,
      phone=excluded.phone, address=excluded.address, status=excluded.status, avatarColor=excluded.avatarColor,
      avatarUrl=excluded.avatarUrl, documents=excluded.documents, basic=excluded.basic,
      allowances=excluded.allowances, deductions=excluded.deductions, updatedAt=excluded.updatedAt`,
    [u.id,u.name,u.email,u.password,u.role,u.jobTitle,u.department,u.joinDate,u.phone||'',u.address||'',
     u.status,u.avatarColor,u.avatarUrl||null,JSON.stringify(u.documents||[]),u.salary.basic,u.salary.allowances,u.salary.deductions,u.updatedAt]);
}
function rowToAttendance(r){ return {employeeId:r.employeeId, date:r.date, status:r.status, checkIn:r.checkIn||null, checkOut:r.checkOut||null}; }
function dbUpsertAttendance(rec){
  dbRun(`INSERT INTO attendance (employeeId,date,status,checkIn,checkOut) VALUES (?,?,?,?,?)
    ON CONFLICT(employeeId,date) DO UPDATE SET status=excluded.status, checkIn=excluded.checkIn, checkOut=excluded.checkOut`,
    [rec.employeeId, rec.date, rec.status, rec.checkIn||null, rec.checkOut||null]);
}
function rowToLeave(r){ return {id:r.id, employeeId:r.employeeId, type:r.type, start:r.start, end:r.end, remarks:r.remarks||'', status:r.status, comment:r.comment||'', createdAt:r.createdAt}; }
function dbInsertLeave(rec){
  dbRun(`INSERT INTO leaves (id,employeeId,type,start,end,remarks,status,comment,createdAt) VALUES (?,?,?,?,?,?,?,?,?)`,
    [rec.id, rec.employeeId, rec.type, rec.start, rec.end, rec.remarks||'', rec.status, rec.comment||'', rec.createdAt]);
}
function dbUpdateLeave(rec){
  dbRun(`UPDATE leaves SET status=?, comment=? WHERE id=?`, [rec.status, rec.comment||'', rec.id]);
}
function loadScript(src){
  return new Promise((resolve, reject)=>{
    if(document.querySelector(`script[src="${src}"]`)) return resolve();
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}
async function initDatabase(){
  const SQL = await window.initSqlJs({
    locateFile: file => 'https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/' + file
  });
  const existing = await storageGet('hrms_db_b64', null);
  if(existing){
    db = new SQL.Database(base64ToUint8(existing));
  } else {
    db = new SQL.Database();
    db.run(SCHEMA);
  }
  // Make sure schema exists even on a freshly-loaded older file.
  db.run(SCHEMA);
  const userCount = dbAll('SELECT COUNT(*) as c FROM users')[0].c;
  if(userCount === 0){
    const users = seedUsers();
    users.forEach(dbUpsertUser);
    const attendance = seedAttendance(users);
    attendance.forEach(dbUpsertAttendance);
    const leaves = seedLeaves(users);
    leaves.forEach(dbInsertLeave);
    await persistDb();
  }
}
function refreshFromDb(){
  app.users = dbAll('SELECT * FROM users').map(rowToUser);
  app.attendance = dbAll('SELECT * FROM attendance').map(rowToAttendance);
  app.leaves = dbAll('SELECT * FROM leaves').map(rowToLeave);
}
function exportDbFile(){
  const bytes = db.export();
  const blob = new Blob([bytes], {type:'application/x-sqlite3'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ledger-hrms.sqlite';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Downloading ledger-hrms.sqlite', 'ok');
}

/* ===================== AUTH ===================== */
function pwRules(pw){
  return {
    len: pw.length>=8,
    upper: /[A-Z]/.test(pw),
    num: /[0-9]/.test(pw),
    special: /[^A-Za-z0-9]/.test(pw),
  };
}
function renderPwHints(pw){
  const r = pwRules(pw);
  const box = document.getElementById('pwHints');
  if(!box) return;
  const items = [
    [r.len,'At least 8 characters'],
    [r.upper,'One uppercase letter'],
    [r.num,'One number'],
    [r.special,'One special character'],
  ];
  box.innerHTML = items.map(([ok,label])=>`<li class="${ok?'ok':''}"><span class="hint-dot"></span>${label}</li>`).join('');
}
function switchAuthMode(mode){
  app.authMode = mode; app.authError=''; app.authInfo='';
  render();
}
async function handleSignup(ev){
  ev.preventDefault();
  const f = ev.target;
  const empId = f.empId.value.trim();
  const name = f.name.value.trim();
  const email = f.email.value.trim().toLowerCase();
  const password = f.password.value;
  const confirm = f.confirm.value;
  const role = f.role.value;

  app.authError = '';
  if(!empId || !name || !email){ app.authError = 'Please fill in every field.'; render(); return; }
  if(app.users.some(u=>u.id.toLowerCase()===empId.toLowerCase())){ app.authError = 'That Employee ID is already registered.'; render(); return; }
  if(app.users.some(u=>u.email===email)){ app.authError = 'That email is already registered.'; render(); return; }
  const r = pwRules(password);
  if(!(r.len&&r.upper&&r.num&&r.special)){ app.authError = 'Password does not meet the security rules below.'; render(); return; }
  if(password !== confirm){ app.authError = 'Passwords do not match.'; render(); return; }

  const code = String(Math.floor(100000 + Math.random()*900000));
  app.pendingUser = {
    id: empId, name, email, password, role,
    jobTitle: role==='admin' ? 'HR Officer' : 'Employee',
    department:'Unassigned', joinDate: todayISO(), phone:'', address:'',
    salary:{basic:30000, allowances:0, deductions:0}, status:'active',
    avatarColor: role==='admin' ? '#3D5A80' : '#4C7A56', avatarUrl:null,
    documents:['Offer Letter.pdf','ID Proof.pdf'], updatedAt: todayISO(),
    _code: code,
  };
  app.authMode = 'verify';
  render();
}
async function handleVerify(ev){
  ev.preventDefault();
  const entered = ev.target.code.value.trim();
  if(entered !== app.pendingUser._code){
    app.authError = 'That verification code is incorrect. Please try again.';
    render(); return;
  }
  const u = Object.assign({}, app.pendingUser);
  delete u._code;
  dbUpsertUser(u);
  await persistDb();
  app.users.push(u);
  app.pendingUser = null;
  app.session = u.id;
  await storageSet('hrms_session', app.session);
  app.route = 'app'; app.navRoute='dashboard'; app.authError=''; app.authInfo='';
  toast('Email verified. Welcome to Ledger, ' + u.name.split(' ')[0] + '.', 'ok');
  render();
}
async function handleSignin(ev){
  ev.preventDefault();
  const email = ev.target.email.value.trim().toLowerCase();
  const password = ev.target.password.value;
  const u = app.users.find(x=>x.email===email);
  if(!u || u.password !== password){
    app.authError = 'Incorrect email or password.';
    render(); return;
  }
  app.session = u.id;
  await storageSet('hrms_session', app.session);
  app.route = 'app'; app.navRoute = 'dashboard'; app.authError='';
  render();
}
async function handleLogout(){
  app.session = null;
  await storageSet('hrms_session', null);
  app.route = 'auth'; app.authMode='signin';
  render();
}

  let rec = attFor(empId, iso);
  if(rec){ rec.status = status; }
  else{ rec = {employeeId:empId, date:iso, status, checkIn:null, checkOut:null}; app.attendance.push(rec); }

async function checkIn(empId){
  const iso = todayISO();
  let rec = attFor(empId, iso);
  const time = new Date().toTimeString().slice(0,5);
  if(rec){ rec.checkIn = time; rec.status='Present'; }
  else{ rec = {employeeId:empId, date:iso, status:'Present', checkIn:time, checkOut:null}; app.attendance.push(rec); }
  dbUpsertAttendance(rec);
  await persistDb();
  toast('Checked in at ' + time, 'ok');
  render();
}
async function checkOut(empId){
  const iso = todayISO();
  let rec = attFor(empId, iso);
  const time = new Date().toTimeString().slice(0,5);
  if(rec){ rec.checkOut = time; dbUpsertAttendance(rec); await persistDb(); }
  toast('Checked out at ' + time, 'ok');
  render();
}
function statusDotClass(status){
  return status==='Present' ? 'present' : status==='Absent' ? 'absent' : status==='Half-day' ? 'half' : status==='Leave' ? 'leave' : '';
}
function buildMonthCells(dateObj, empId){
  const y = dateObj.getFullYear(), m = dateObj.getMonth();
  const first = new Date(y,m,1);
  const startPad = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const cells = [];
  for(let i=0;i<startPad;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++){
    const iso = isoOf(y,m,d);
    const rec = empId ? attFor(empId, iso) : null;
    cells.push({ iso, day:d, status: rec ? rec.status : null, isToday: iso===todayISO() });
  }
  return cells;
}
function changeAttMonth(which, delta){
  const key = which==='admin' ? 'adminAttMonth' : 'attMonth';
  const d = new Date(app[key]);
  d.setMonth(d.getMonth()+delta);
  app[key] = d;
  render();
}

/* ===================== LEAVE HELPERS ===================== */
function isoInRange(iso, start, end){ return iso>=start && iso<=end; }
function pickLeaveDate(iso){
  const f = app.leaveForm;
  if(!f.start || (f.start && f.end)){ f.start = iso; f.end = null; }
  else if(iso < f.start){ f.start = iso; }
  else { f.end = iso; }
  render();
}
function clearLeaveRange(){ app.leaveForm.start=null; app.leaveForm.end=null; render(); }
function changeLeaveCalMonth(delta){
  const d = new Date(app.leaveForm.calMonth);
  d.setMonth(d.getMonth()+delta);
  app.leaveForm.calMonth = d;
  render();
}
async function submitLeave(ev){
  ev.preventDefault();
  const f = app.leaveForm;
  if(!f.start){ toast('Select at least a start date on the calendar.', 'error'); return; }
  const end = f.end || f.start;
  const rec = {
    id: uid('LV'), employeeId: app.session, type: f.type,
    start: f.start, end, remarks: f.remarks || '',
    status: 'Pending', comment: '', createdAt: todayISO(),
  };
  dbInsertLeave(rec);
  await persistDb();
  app.leaves.unshift(rec);
  app.leaveForm = { type:'Paid', start:null, end:null, remarks:'', calMonth: new Date() };
  toast('Leave request submitted.', 'ok');
  render();
}
function draftLeaveType(v){ app.leaveForm.type = v; }
function draftLeaveRemarks(v){ app.leaveForm.remarks = v; }
async function decideLeave(leaveId, decision){
  const lv = app.leaves.find(l=>l.id===leaveId);
  if(!lv) return;
  lv.status = decision;
  lv.comment = app.commentDraft[leaveId] || lv.comment || '';
  dbUpdateLeave(lv);
  await persistDb();
  if(decision==='Approved'){
    let d = new Date(lv.start+'T00:00:00');
    const endD = new Date(lv.end+'T00:00:00');
    while(d <= endD){
      const iso = d.toISOString().slice(0,10);
      await setAttendanceStatus(lv.employeeId, iso, 'Leave');
      d.setDate(d.getDate()+1);
    }
  }
  toast('Leave request ' + decision.toLowerCase() + '.', decision==='Approved' ? 'ok' : 'error');
  render();
}
function draftComment(id, v){ app.commentDraft[id] = v; }

/* ===================== PROFILE HELPERS ===================== */
function resizeAndStore(file, empId){
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = async function(){
      const canvas = document.createElement('canvas');
      const size = 128;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
      const u = findUser(empId);
      u.avatarUrl = dataUrl;
      dbUpsertUser(u);
      await persistDb();
      toast('Profile photo updated.', 'ok');
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
async function saveProfile(ev, empId, adminEditing){
  ev.preventDefault();
  const f = ev.target;
  const u = findUser(empId);
  u.phone = f.phone.value.trim();
  u.address = f.address.value.trim();
  if(adminEditing){
    u.name = f.name.value.trim();
    u.jobTitle = f.jobTitle.value.trim();
    u.department = f.department.value.trim();
    u.status = f.status.value;
  }
  dbUpsertUser(u);
  await persistDb();
  toast('Profile updated.', 'ok');
  render();
}

/* ===================== DATABASE EXPLORER FUNCTIONS ===================== */
function loadDbSchema() {
  try {
    const tables = dbAll("SELECT type, name, tbl_name, sql FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'");
    app.dbSchema = tables.map(t => {
      const columns = dbAll(`PRAGMA table_info("${t.name}")`);
      return {
        name: t.name,
        sql: t.sql,
        columns: columns.map(c => ({
          cid: c.cid,
          name: c.name,
          type: c.type,
          notnull: c.notnull,
          dflt_value: c.dflt_value,
          pk: c.pk
        }))
      };
    });
  } catch (e) {
    console.error('Failed to load local DB schema', e);
  }
}

async function openDbTable(tableName) {
  app.dbActiveTable = tableName;
  app.dbTablePage = 1;
  app.dbTableSearch = '';
  await refreshTableData();
}

async function refreshTableData() {
  const tableName = app.dbActiveTable;
  const page = app.dbTablePage;
  const limit = app.dbTableLimit;
  const search = app.dbTableSearch.trim();

  if (!app.dbSchema) {
    loadDbSchema();
  }

  const tableInfo = app.dbSchema ? app.dbSchema.find(t => t.name === tableName) : null;
  const columns = tableInfo ? tableInfo.columns.map(c => c.name) : [];

  let sqlQuery = `SELECT * FROM "${tableName}"`;
  let sqlCount = `SELECT COUNT(*) as cnt FROM "${tableName}"`;

  if (search && columns.length > 0) {
    const likeClauses = columns.map(c => `CAST("${c}" AS TEXT) LIKE '%${search.replace(/'/g, "''")}%'`);
    const whereClause = ` WHERE ${likeClauses.join(' OR ')}`;
    sqlQuery += whereClause;
    sqlCount += whereClause;
  }

  sqlQuery += ` LIMIT ${limit} OFFSET ${(page - 1) * limit};`;

  try {
    const start = performance.now();
    const rows = dbAll(sqlQuery);
    const countRows = dbAll(sqlCount);
    const end = performance.now();

    const totalRows = countRows[0] ? countRows[0].cnt : 0;
    const totalPages = Math.ceil(totalRows / limit) || 1;

    app.dbQueryResult = {
      success: true,
      type: 'table_view',
      rows,
      columns: rows.length > 0 ? Object.keys(rows[0]) : columns,
      totalRows,
      totalPages,
      timeMs: Math.round(end - start)
    };
    render();
  } catch (e) {
    app.dbQueryResult = {
      success: false,
      error: e.message
    };
    render();
  }
}

async function executeCustomSql() {
  const query = app.dbQueryText.trim();
  if (!query) return;

  try {
    const start = performance.now();
    const trimmed = query.trim().toLowerCase();
    const isSelect = trimmed.startsWith('select') || trimmed.startsWith('pragma') || trimmed.startsWith('explain') || trimmed.startsWith('show');
    
    let rows = [];
    let changes = 0;
    if (isSelect) {
      rows = dbAll(query);
    } else {
      dbRun(query);
      changes = db.getRowsModified();
      await persistDb();
      refreshFromDb(); // sync state with database modifications
    }
    const end = performance.now();

    app.dbQueryResult = {
      success: true,
      type: isSelect ? 'select' : 'run',
      rows,
      columns: rows.length > 0 ? Object.keys(rows[0]) : [],
      changes,
      lastInsertRowid: null,
      timeMs: Math.round(end - start)
    };
    loadDbSchema();
    render();
  } catch (e) {
    app.dbQueryResult = {
      success: false,
      error: e.message
    };
    render();
  }
}

function selectDbTab(tab) {
  app.dbSubRoute = tab;
  app.dbQueryResult = null;
  if (tab === 'data') {
    openDbTable(app.dbActiveTable);

    loadDbSchema();
    render();
  } else {
    render();
  }
}

/* ===================== API DEVELOPMENT & INTEGRATION ===================== */
function selectApiEndpoint(index) {
  const ep = API_DIRECTORY[index];
  app.apiSubRoute = 'tester';
  app.apiTester.method = ep.method;
  app.apiTester.url = ep.path;
  app.apiTester.headers = [
    {key: 'Content-Type', value: 'application/json'}
  ];
  if (ep.auth) {
    app.apiTester.headers.push({key: 'X-User-Id', value: app.session || 'EMP-1000'});
  }
  app.apiTester.body = ep.reqBody ? JSON.stringify(ep.reqBody, null, 2) : '';
  app.apiTester.response = null;
  render();
}

function addTesterHeader() {
  app.apiTester.headers.push({key: '', value: ''});
  render();
}

function removeTesterHeader(idx) {
  app.apiTester.headers.splice(idx, 1);
  render();
}

async function sendApiTesterRequest() {
  app.apiTester.loading = true;
  app.apiTester.response = null;
  render();

  const tester = app.apiTester;
  const reqHeaders = {};
  tester.headers.forEach(h => {
    if (h.key.trim()) {
      reqHeaders[h.key.trim()] = h.value;
    }
  });

  const options = {
    method: tester.method,
    headers: reqHeaders
  };

  if (tester.method !== 'GET' && tester.body.trim()) {
    options.body = tester.body;
  }

  // Prepend local Express server host since we are loading via file:// in offline mode
  let fetchUrl = tester.url;
  if (fetchUrl.startsWith('/')) {
    fetchUrl = 'http://localhost:8080' + fetchUrl;
  }

  const start = performance.now();
  try {
    const res = await fetch(fetchUrl, options);
    const text = await res.text();
    const end = performance.now();

    let json = null;
    try { json = JSON.parse(text); } catch (e) {}

    const resHeaders = {};
    res.headers.forEach((v, k) => {
      resHeaders[k] = v;
    });

    app.apiTester.response = {
      success: res.ok,
      status: res.status,
      statusText: res.statusText,
      headers: resHeaders,
      body: json !== null ? JSON.stringify(json, null, 2) : text,
      timeMs: Math.round(end - start)
    };
  } catch (err) {
    app.apiTester.response = {
      success: false,
      status: 0,
      statusText: 'Network Error (Is Express server running?)',
      headers: {},
      body: err.message,
      timeMs: 0
    };
  } finally {
    app.apiTester.loading = false;
    render();
  }
}

async function triggerWebhookTest(whId) {
  const wh = app.webhooks.find(w => w.id === whId);
  if (!wh) return;

  const payload = {
    event: wh.event,
    timestamp: new Date().toISOString(),
    webhookId: wh.id,
    data: wh.event === 'attendance.checkin' ? {
      employeeId: 'EMP-1001',
      employeeName: 'Arjun Sen',
      date: todayISO(),
      checkIn: '09:14'
    } : {
      leaveId: 'LV-49a21b',
      employeeId: 'EMP-1002',
      employeeName: 'Meher Iqbal',
      type: 'Paid',
      start: '2026-07-10',
      end: '2026-07-12',
      status: 'Approved',
      comment: 'Approved by HR officer.'
    }
  };

  const logId = 'log-' + Math.random().toString(36).slice(2,9);
  const logEntry = {
    id: logId,
    webhookId: wh.id,
    event: wh.event,
    url: wh.url,
    timestamp: new Date().toTimeString().slice(0,8),
    status: 'Sending...',
    success: null
  };
  app.webhookLogs.unshift(logEntry);
  render();

  try {
    const res = await fetch(wh.url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-HRMS-Signature': 'mock_sha256_signature_for_integrity'
      },
      body: JSON.stringify(payload)
    });
    logEntry.status = `${res.status} ${res.statusText}`;
    logEntry.success = res.ok;
  } catch (err) {
    logEntry.status = 'Failed (Network Error)';
    logEntry.success = false;
  }
  render();
}

function addWebhook(ev) {
  ev.preventDefault();
  const f = ev.target;
  const event = f.event.value;
  const url = f.url.value.trim();
  const desc = f.desc.value.trim();

  if (!url) {
    toast('Webhook Destination URL is required', 'error');
    return;
  }

  app.webhooks.push({
    id: 'wh-' + Math.random().toString(36).slice(2,9),
    event,
    url,
    desc
  });
  f.reset();
  toast('Webhook registered successfully', 'ok');
  render();
}

function removeWebhook(id) {
  app.webhooks = app.webhooks.filter(w => w.id !== id);
  toast('Webhook removed', 'error');
  render();
}
